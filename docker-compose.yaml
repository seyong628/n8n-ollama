services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # 기본 설정
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Webhook URL (로컬 개발용)
      - WEBHOOK_URL=http://localhost:5678/
      # 타임존
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      # 보안 (로컬 개발용 - 프로덕션에서는 변경 필요)
      - N8N_SECURE_COOKIE=false
      # Ollama 접근 주소 (Docker -> Windows Host)
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      # WSL2 Docker에서 Windows 호스트 접근
      - "host.docker.internal:host-gateway"

volumes:
  n8n_data:
    driver: local
